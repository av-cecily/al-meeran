<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabric Shop | Al Meeran Upholstery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#F8F9FA] text-[#1A2238]">

    <div id="global-header"></div>
    <div id="global-drawer"></div>

    <main class="pt-32">
        <section class="bg-[#1A2238] py-24 text-center text-white relative overflow-hidden">
            <div class="absolute inset-0 opacity-20">
                <img src="https://images.unsplash.com/photo-1540518614846-7eded433c457?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10">
                <h1 class="text-5xl font-black uppercase tracking-tighter mb-4">Free Fabric Samples</h1>
                <p class="text-[#C5A059] font-bold tracking-[0.4em] uppercase text-xs">Select your favorite fabrics and we will send you free samples.</p>
            </div>
        </section>

        <section class="py-20 container mx-auto px-6 text-center">
            <h2 class="text-2xl font-bold tracking-tight mb-12">Our Collection</h2>
            <div id="fabric-collection-grid" class="grid grid-cols-1 sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4 xl:grid-cols-6 gap-8 text-left"></div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/components/global-loader.js"></script>
    <script src="js/components/cart.js"></script>
    <script src="js/components/assistant.js"></script>
    <script src="js/pages/home.js"></script>
</body>
</html>
