<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Request a Quote | Al Meeran Upholstery</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/styles.css">
</head>
<body class="bg-[#F8F9FA] text-[#1A2238]">
    <div id="global-drawer"></div>

    <!-- Header -->
    <div id="global-header"></div>

    <main class="pt-32">
        <section class="bg-[#1A2238] py-24 text-center text-white relative overflow-hidden">
            <div class="absolute inset-0 opacity-20">
                <img src="https://images.unsplash.com/photo-1540518614846-7eded433c457?q=80&w=2000&auto=format&fit=crop" class="w-full h-full object-cover">
            </div>
            <div class="relative z-10">
                <h1 class="text-5xl font-black uppercase tracking-tighter mb-4">Request a Quote</h1>
                <p class="text-[#C5A059] font-bold tracking-[0.4em] uppercase text-xs">Tell us about your next masterpiece</p>
            </div>
        </section>

        <section class="py-20 container mx-auto px-6">
            <div class="max-w-5xl mx-auto bg-white rounded-[40px] shadow-2xl overflow-hidden flex flex-col md:flex-row border border-gray-100">
                <!-- Contact Info Sidebar -->
                <div class="md:w-1/3 bg-[#1A2238] p-12 text-white">
                    <h2 class="text-3xl font-extrabold mb-8">Get in Touch</h2>
                    <p class="text-gray-400 mb-12 text-sm leading-relaxed">Fill out the form and our team will contact you within 24 hours to discuss your project.</p>
                    
                    <div class="space-y-8">
                        <div class="flex items-start">
                            <i data-lucide="phone" class="w-5 h-5 text-[#C5A059] mr-4 mt-1"></i>
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">Call Us</p>
                                <p class="font-bold">00973 17345665</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i data-lucide="mail" class="w-5 h-5 text-[#C5A059] mr-4 mt-1"></i>
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-500 mb-1">Email Us</p>
                                <p class="font-bold">info@almeeran.ae</p>
                            </div>
                        </div>
                        <div class="flex items-start">
                            <i data-lucide="map-pin" class="w-5 h-5 text-[#C5A059] mr-4 mt-1"></i>
                            <div>
                                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400 mb-1">Our Workshop</p>
                                <p class="font-bold uppercase tracking-tight">Manama, Bahrain</p>
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Quote Form -->
                <div class="md:w-2/3 p-12 lg:p-20">
                    <form id="upholstery-quote-form" class="space-y-8">
                        <div class="grid md:grid-cols-2 gap-8">
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Your Name</label>
                                <input type="text" name="user_name" required class="w-full border-b border-gray-200 py-3 focus:border-[#C5A059] outline-none transition bg-transparent">
                            </div>
                            <div class="space-y-2">
                                <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Phone Number</label>
                                <input type="tel" name="user_phone" required class="w-full border-b border-gray-200 py-3 focus:border-[#C5A059] outline-none transition bg-transparent">
                            </div>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Service Type</label>
                            <select name="furniture_type" class="w-full border-b border-gray-200 py-3 focus:border-[#C5A059] outline-none transition bg-transparent">
                                <option>Sofa Upholstery</option>
                                <option>Antique Restoration</option>
                                <option>Car Interior</option>
                                <option>Custom Cushioning</option>
                            </select>
                        </div>

                        <div class="space-y-2">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Project Details</label>
                            <textarea name="user_message" rows="4" placeholder="Tell us about your furniture..." class="w-full border border-gray-100 p-4 rounded-xl focus:border-[#C5A059] outline-none transition bg-gray-50"></textarea>
                        </div>

                        <div class="space-y-4">
                            <label class="text-[10px] font-bold uppercase tracking-widest text-gray-400 block">Upload Furniture Photo (Optional)</label>
                            <div class="border-2 border-dashed border-gray-100 p-8 rounded-2xl text-center hover:border-[#C5A059] transition-all bg-gray-50/50 group relative">
                                <i data-lucide="image-plus" class="w-8 h-8 mx-auto text-gray-300 mb-2 group-hover:text-[#C5A059] transition"></i>
                                <p class="text-[10px] font-bold uppercase tracking-widest text-gray-400">Click to Select Photo</p>
                                <input type="file" name="furniture_image" accept="image/*" class="absolute inset-0 opacity-0 cursor-pointer" onchange="this.previousElementSibling.textContent = this.files[0].name; this.previousElementSibling.classList.add('text-[#C5A059]')">
                            </div>
                        </div>

                        <button type="submit" class="w-full bg-[#1A2238] text-white py-5 rounded-xl font-bold uppercase tracking-[0.2em] text-xs hover:bg-[#C5A059] transition-all shadow-xl">Submit Request</button>
                    </form>
                </div>
            </div>
        </section>
    </main>

    <div id="global-footer"></div>

    <script src="js/pages/request-quote.js"></script>
    <script>lucide.createIcons();</script>
<script src="js/components/global-loader.js"></script><script src="js/components/cart.js"></script><script src="js/components/assistant.js"></script></body>
</html>
